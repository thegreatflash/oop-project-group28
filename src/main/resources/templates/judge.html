<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit Score — Group 28</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav>
    <a href="/" class="nav-brand">
        <div class="nav-logo-box">LB</div>
        <span class="nav-brand-text">LEADER<span>BOARD</span></span>
    </a>
    <a href="/">Home</a>
    <a href="/leaderboard">Live Scores</a>
    <a href="/judge" class="active">Submit Score</a>
    <a href="/admin" sec:authorize="hasRole('ADMIN')">Admin</a>
    <span sec:authorize="hasRole('ADMIN')"      class="nav-role-badge badge-admin">Admin</span>
    <span sec:authorize="hasRole('JUDGE')"       class="nav-role-badge badge-judge">Judge</span>
    <form th:action="@{/logout}" method="post" class="nav-logout-form">
        <button type="submit" class="nav-logout">Sign out</button>
    </form>
</nav>
<main>
    <h1>Submit Score</h1>
    <div class="page-accent-bar bar-amber"></div>
    <div th:if="${message}" class="alert alert-success">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8 5v3M8 10.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span th:text="${error}"></span>
    </div>
    <div class="form-card">
        <form method="post" th:action="@{/judge}">
            <div class="form-group">
                <label for="judge">Judge</label>
                <select id="judge" name="judge">
                    <option th:each="j : ${judges}" th:value="${j.name}" th:text="${j.name}">Judge</option>
                </select>
            </div>
            <div class="form-group">
                <label for="competition">Competition</label>
                <select id="competition" name="competition" onchange="location.href='/judge?competition=' + this.value">
                    <option th:each="c : ${competitions}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id == selected.id}">Competition</option>
                </select>
            </div>
            <div class="form-group">
                <label for="participant">Participant</label>
                <select id="participant" name="participant">
                    <option th:each="p : ${participants}" th:value="${p.id}" th:text="${p.name}">Participant</option>
                </select>
            </div>
            <div class="form-group">
                <label for="score">Score <span class="muted">(0 – 100, whole number)</span></label>
                <input type="text" id="score" name="score" placeholder="e.g. 85" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-teal" style="width:100%; justify-content:center; padding:12px;">
                Submit Score
            </button>
        </form>
    </div>
</main>
</body>
</html>
