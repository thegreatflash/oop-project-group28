<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — Group 28</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav>
    <a href="/" class="nav-brand">
        <div class="nav-logo-box">LB</div>
        <span class="nav-brand-text">LEADER<span>BOARD</span></span>
    </a>
    <a href="/">Home</a>
    <a href="/leaderboard">Live Scores</a>
    <a href="/judge" sec:authorize="hasAnyRole('JUDGE','ADMIN')">Submit Score</a>
    <a href="/admin" class="active">Admin</a>
    <span class="nav-role-badge badge-admin">Admin</span>
    <form th:action="@{/logout}" method="post" class="nav-logout-form">
        <button type="submit" class="nav-logout">Sign out</button>
    </form>
</nav>
<main>
    <h1>Admin Panel</h1>
    <div class="page-accent-bar bar-pink"></div>
    <div th:if="${message}" class="alert alert-success">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8 5v3M8 10.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span th:text="${error}"></span>
    </div>
    <div class="admin-section">
        <h2>
            <div class="section-icon icon-violet">
                <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                    <rect x="2" y="2" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                    <rect x="9.5" y="2" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                    <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                </svg>
            </div>
            Competition Actions
        </h2>
        <form method="post" th:action="@{/admin/reset}">
            <div class="form-group" style="max-width:340px; margin-bottom:18px;">
                <label for="competition">Select Competition</label>
                <select id="competition" name="competition">
                    <option th:each="c : ${competitions}" th:value="${c.id}" th:text="${c.name}">Competition</option>
                </select>
            </div>
            <div class="btn-row">
                <button type="submit" formaction="/admin/export" class="btn btn-ghost">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <path d="M7.5 1v8M4.5 6l3 3 3-3M2 10v2a1 1 0 001 1h9a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Export to CSV
                </button>
                <button type="submit" formaction="/admin/reset" class="btn btn-danger"
                        onclick="return confirm('Reset all scores for this competition? This cannot be undone.')">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <path d="M2.5 7.5A5 5 0 1112.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        <path d="M2.5 4.5v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Reset Scores
                </button>
            </div>
        </form>
    </div>
    <hr class="section-divider">
    <div class="admin-section">
        <h2>
            <div class="section-icon icon-teal">
                <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                    <circle cx="8.5" cy="8.5" r="6.5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M7 6.5l5 2-5 2V6.5z" fill="currentColor"/>
                </svg>
            </div>
            Score Simulator
        </h2>
        <p class="muted" style="margin-bottom:18px;">Submits random judge scores every 0.4 s. Start it, then open Live Scores to watch ranks reorder.</p>
        <form method="post" th:action="@{/admin/simulator}">
            <button type="submit" th:class="${simulatorRunning} ? 'btn btn-danger' : 'btn btn-primary'">
                <svg th:if="${simulatorRunning}" width="15" height="15" viewBox="0 0 15 15" fill="none">
                    <rect x="3" y="3" width="3.5" height="9" rx="1" fill="currentColor"/>
                    <rect x="8.5" y="3" width="3.5" height="9" rx="1" fill="currentColor"/>
                </svg>
                <svg th:unless="${simulatorRunning}" width="15" height="15" viewBox="0 0 15 15" fill="none">
                    <path d="M4 2.5l9 5-9 5V2.5z" fill="currentColor"/>
                </svg>
                <span th:text="${simulatorRunning} ? 'Stop Simulator' : 'Start Simulator'">Start Simulator</span>
            </button>
        </form>
        <div th:if="${simulatorRunning}" class="live-badge" style="margin-top:14px; width:fit-content;">
            <span class="live-dot"></span> Simulator running
        </div>
    </div>
</main>
</body>
</html>
